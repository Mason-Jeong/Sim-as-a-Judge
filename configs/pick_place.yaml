# configs/tasks/pick_place.yaml
task: pick_place
criteria:
  reach:
    distance_threshold: 0.10
  grasp:
    finger_close_threshold: 0.5
  lift:
    min_height_delta: 0.05
  place:
    target_position: [0.6, -0.3, 0.7]
